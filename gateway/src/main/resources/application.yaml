spring:
    application:
        name: gateway
    profiles:
        include: route
    cloud:
        nacos:
            server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            database: ${REDIS_DATABASE:0}
server:
    port: 80
