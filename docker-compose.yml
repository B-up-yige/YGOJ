version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:5.7.40
    container_name: ygoj-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ygoj-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: ygoj-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: root
      RABBITMQ_DEFAULT_VHOST: /judgeQueue
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: ygoj-nacos
    restart: always
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: embedded
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 80
    container_name: ygoj-gateway
    restart: always
    ports:
      - "80:80"
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygoj-network

  # Service User
  service-user:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-user
        SERVICE_PORT: 8001
    container_name: ygoj-service-user
    restart: always
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygoj-network

  # Service Problem
  service-problem:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-problem
        SERVICE_PORT: 8000
    container_name: ygoj-service-problem
    restart: always
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/problem?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    volumes:
      - file-data:/app/file
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygoj-network

  # Service Record
  service-record:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-record
        SERVICE_PORT: 8002
    container_name: ygoj-service-record
    restart: always
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/record?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: root
      SPRING_RABBITMQ_PASSWORD: root
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ygoj-network

  # Service Judger
  service-judger:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-judger
        SERVICE_PORT: 8003
    container_name: ygoj-service-judger
    restart: always
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/problem?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: root
      SPRING_RABBITMQ_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      DOCKER_HOST: unix:///var/run/docker.sock
      TZ: Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - judger-temp:/app/temp
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygoj-network

  # File System
  file-system:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: fileSystem
        SERVICE_PORT: 9201
    container_name: ygoj-file-system
    restart: always
    environment:
      SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
      FILESYSTEM_ROOT_PATH: /app/file
      TZ: Asia/Shanghai
    volumes:
      - file-data:/app/file
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - ygoj-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ygoj-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - ygoj-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  nacos-data:
  file-data:

networks:
  ygoj-network:
    driver: bridge
