services:
  # MySQL 数据库
  mysql:
    image: mysql/mysql-server:5.7.40
    container_name: ygoj-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+8:00
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:latest
    container_name: ygoj-redis
    restart: always
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ygoj-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-root}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-root}
      RABBITMQ_DEFAULT_VHOST: /judgeQueue
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 40s

  # Nacos
  nacos:
#    image: nacos/nacos-server:v2.4.3
    image: nacos-registry.cn-hangzhou.cr.aliyuncs.com/nacos/nacos-server:v2.4.3
    container_name: ygoj-nacos
    restart: always
    ports:
      - "8848:8848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: false
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-root}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-root}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-HbNjoo07D6HglvkFilh+LgDHQqEtrk2mY/xT6d7SWzQ=}
      TZ: Asia/Shanghai
    volumes:
      - nacos-data:/home/nacos/data
    networks:
      - ygoj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Seata Server
  seata-server:
    image: apache/seata-server:2.1.0
    container_name: ygoj-seata-server
    restart: always
    environment:
      SEATA_PORT: 8091
      STORE_MODE: file
      TZ: Asia/Shanghai
    volumes:
      - seata-data:/root/seata-data
    networks:
      - ygoj-network

  # Sentinel Dashboard
  sentinel-dashboard:
#    image: bladex/sentinel-dashboard:1.8.6
    image: crpi-mj22d4gugnan1hnt.cn-shenzhen.personal.cr.aliyuncs.com/yige123/sentinel-dashboard:1.8.6
    container_name: ygoj-sentinel-dashboard
    restart: always
    environment:
      TZ: Asia/Shanghai
    networks:
      - ygoj-network

  # Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 80
    container_name: ygoj-gateway
    restart: always
    ports:
      - "${GATEWAY_PORT:-80}:80"
    environment:
      SPRING_OPTS: >-
        -Dspring.cloud.nacos.server-addr=nacos:8848
        -Dspring.data.redis.host=redis
        -Dspring.data.redis.port=6379
        -Dspring.data.redis.database=0
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ygoj-network

  # Service User
  service-user:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-user
        SERVICE_PORT: 8001
    container_name: ygoj-service-user
    restart: always
    environment:
      SPRING_OPTS: >-
        -Dspring.cloud.nacos.server-addr=nacos:8848
        -Dspring.datasource.url=jdbc:mysql://mysql:3306/user?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        -Dspring.datasource.username=ygoj
        -Dspring.datasource.password=ygoj123456
        -Dspring.data.redis.host=redis
        -Dspring.data.redis.port=6379
        -Dspring.data.redis.database=0
        -Dseata.registry.address=seata-server:8091
        -Dseata.service.vgroup-mapping.default_tx_group=default
        -Dseata.service.grouplist.default=seata-server:8091
        -Dspring.cloud.sentinel.transport.dashboard=sentinel-dashboard:8858
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      seata-server:
        condition: service_started
      sentinel-dashboard:
        condition: service_started
    networks:
      - ygoj-network

  # Service Problem
  service-problem:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-problem
        SERVICE_PORT: 8000
    container_name: ygoj-service-problem
    restart: always
    environment:
      SPRING_OPTS: >-
        -Dspring.cloud.nacos.server-addr=nacos:8848
        -Dspring.datasource.url=jdbc:mysql://mysql:3306/problem?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        -Dspring.datasource.username=ygoj
        -Dspring.datasource.password=ygoj123456
        -Dspring.data.redis.host=redis
        -Dspring.data.redis.port=6379
        -Dspring.data.redis.database=0
        -Dseata.registry.address=seata-server:8091
        -Dseata.service.vgroup-mapping.default_tx_group=default
        -Dseata.service.grouplist.default=seata-server:8091
        -Dspring.cloud.sentinel.transport.dashboard=sentinel-dashboard:8858
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      seata-server:
        condition: service_started
      sentinel-dashboard:
        condition: service_started
    networks:
      - ygoj-network

  # Service Record
  service-record:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-record
        SERVICE_PORT: 8002
    container_name: ygoj-service-record
    restart: always
    environment:
      SPRING_OPTS: >-
        -Dspring.cloud.nacos.server-addr=nacos:8848
        -Dspring.datasource.url=jdbc:mysql://mysql:3306/record?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        -Dspring.datasource.username=ygoj
        -Dspring.datasource.password=ygoj123456
        -Dspring.rabbitmq.host=rabbitmq
        -Dspring.rabbitmq.port=5672
        -Dspring.rabbitmq.virtual-host=/judgeQueue
        -Dspring.rabbitmq.username=${RABBITMQ_USERNAME:-root}
        -Dspring.rabbitmq.password=${RABBITMQ_PASSWORD:-root}
        -Dseata.registry.address=seata-server:8091
        -Dseata.service.vgroup-mapping.default_tx_group=default
        -Dseata.service.grouplist.default=seata-server:8091
        -Dspring.cloud.sentinel.transport.dashboard=sentinel-dashboard:8858
      TZ: Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seata-server:
        condition: service_started
      sentinel-dashboard:
        condition: service_started
    networks:
      - ygoj-network

  # Service Judger
  service-judger:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: services/service-judger
        SERVICE_PORT: 8003
    container_name: ygoj-service-judger
    restart: always
    environment:
      SPRING_OPTS: >-
        -Dspring.cloud.nacos.server-addr=nacos:8848
        -Dspring.datasource.url=jdbc:mysql://mysql:3306/problem?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
        -Dspring.datasource.username=ygoj
        -Dspring.datasource.password=ygoj123456
        -Dspring.rabbitmq.host=rabbitmq
        -Dspring.rabbitmq.port=5672
        -Dspring.rabbitmq.virtual-host=/judgeQueue
        -Dspring.rabbitmq.username=${RABBITMQ_USERNAME:-root}
        -Dspring.rabbitmq.password=${RABBITMQ_PASSWORD:-root}
        -Dspring.data.redis.host=redis
        -Dspring.data.redis.port=6379
        -Dspring.data.redis.database=0
        -Dseata.registry.address=seata-server:8091
        -Dseata.service.vgroup-mapping.default_tx_group=default
        -Dseata.service.grouplist.default=seata-server:8091
        -Dspring.cloud.sentinel.transport.dashboard=sentinel-dashboard:8858
      DOCKER_HOST: unix:///var/run/docker.sock
      TZ: Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/judgerTemp:/tmp/judgerTemp
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      seata-server:
        condition: service_started
      sentinel-dashboard:
        condition: service_started
    networks:
      - ygoj-network

  # File System
  file-system:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: fileSystem
        SERVICE_PORT: 9201
    container_name: ygoj-file-system
    restart: always
    environment:
      SPRING_OPTS: >-
        -Dspring.cloud.nacos.server-addr=nacos:8848
        -Dfilesystem.root.path=/app/file
      TZ: Asia/Shanghai
    volumes:
      - file-data:/app/app/file
    depends_on:
      nacos:
        condition: service_healthy
    networks:
      - ygoj-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_TARGET: ${VITE_API_TARGET:-http://gateway:80}
    container_name: ygoj-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - gateway
    networks:
      - ygoj-network

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  nacos-data:
  file-data:
  judger-temp:
  seata-data:

networks:
  ygoj-network:
    driver: bridge
